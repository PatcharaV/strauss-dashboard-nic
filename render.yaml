services:
  - type: web
    name: vvic-dashboard-nic
    runtime: python
    plan: free
    buildCommand: python -m pip install --timeout 120 --retries 10 -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
